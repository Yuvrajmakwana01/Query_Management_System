<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolvePoint OTP</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f2f5;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            width: 100%;
            padding: 40px 0;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .email-card {
            max-width: 550px;
            margin: auto;
            background: #fff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .hero-gradient {
            background: linear-gradient(135deg, #292727, #2b375b);
            padding: 50px 30px;
            text-align: center;
        }

        /* .hero-gradient img {
            width: 200px;
        } */
         .hero-gradient { 
            background: linear-gradient(135deg, #292727 0%, #2b375b 100%); 
            padding: 60px 40px; 
            text-align: center; 
            color: #ffffff;
        }

        .badge {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 16px;
            background: rgba(56, 189, 248, 0.15);
            color: #38bdf8;
            border-radius: 100px;
            font-size: 12px;
            font-weight: 700;
        }

        .content-body {
            padding: 40px;
            text-align: center;
        }

        .headline {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
        }

        .subtext {
            color: #64748b;
            margin: 20px 0;
            line-height: 1.6;
        }

        .otp-box {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 10px;
            color: #4e73df;
            background: #e8edff;
            padding: 15px 30px;
            border-radius: 12px;
            display: inline-block;
            margin: 20px 0;
            font-family: monospace;
        }

        .warning {
            font-size: 13px;
            color: #e74a3b;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>

</head>

<body>
    <div class="container">
        <div class="email-card">

            <div class="hero-gradient">
                <img src="{{Logo}}" width="500" style="display:block; align-items: center; margin-left:0; padding-right: 10;"  />
                <div class="badge">Password Reset</div>
            </div>

            <div class="content-body">
                <h2 class="headline">Reset Your Password 🔐</h2>

                ```
                <p class="subtext">
                    Use the OTP below to reset your password.
                </p>

                <div class="otp-box">
                    {{OTP}}
                </div>

                <p class="warning">
                    This OTP is valid for <strong>15 minutes</strong>.
                </p>

                <p class="subtext">
                    If you didn’t request this, you can safely ignore this email.
                </p>
                ```

            </div>

            <div class="footer">
                © 2026 SolvePoint. All rights reserved.
            </div>

        </div>
    </div>
</body>

</html>
